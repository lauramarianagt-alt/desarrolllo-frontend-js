<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear anuncio</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <h1>Crear un nuevo anuncio</h1>
    </header>

    <form id="create-advert-form">
        <input type="text" name="name" placeholder="Nombre" required>
        <textarea name="description" placeholder="Descripción" required></textarea>
        <input type="number" name="price" placeholder="Precio" required>
        <select name="sale" required>
            <option value="">Selecciona</option>
            <option value="true">Venta</option>
            <option value="false">Compra</option>
        </select>
        <input type="text" name="photo" placeholder="URL imagen (opcional)">
        <button type="submit">Guardar anuncio</button>
    </form>

    <script type="module" src="./js/create-advert.js"></script>

    
</body>
</html>
